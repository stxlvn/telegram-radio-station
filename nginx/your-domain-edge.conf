server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-domain.com www.your-domain.com;

    ssl_certificate /etc/letsencrypt/live/your-domain.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com-0001/privkey.pem;

    ssl_ecdh_curve X25519MLKEM768:X25519:secp384r1;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/your-domain.com;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
        etag off;
        if_modified_since off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma no-cache always;
    }

    # Beget's network cannot reach Finland/Netherlands directly (selective
    # transit blocking observed). Chain through the FVDS relay, which can.
    location /radio/ {
        proxy_pass https://YOUR_RELAY_IP/radio/;
        proxy_ssl_verify off;
        proxy_set_header Host your-domain.com;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 5s;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma no-cache always;
    }

    location /api/subscribers.json {
        proxy_pass https://YOUR_RELAY_IP/api/subscribers.json;
        proxy_ssl_verify off;
        proxy_set_header Host your-domain.com;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma no-cache always;
    }

    # Manual queue-editing admin panel, chained through FVDS (which reaches
    # Finland directly) same as /radio/. Auth checked here too, not just at
    # FVDS, so it's covered regardless of which relay a request lands on.
    location /admin/ {
        auth_basic "MusicmaniA Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-admin;
        proxy_pass https://YOUR_RELAY_IP/admin/;
        proxy_ssl_verify off;
        proxy_set_header Host your-domain.com;
        proxy_set_header X-Forwarded-Prefix /admin;
        client_max_body_size 300M;
        client_body_timeout 600s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location = /playlist.m3u {
        default_type audio/x-mpegurl;
        add_header Content-Disposition 'attachment; filename="playlist.m3u"';
    }
    location = /playlist-flac.m3u {
        default_type audio/x-mpegurl;
        add_header Content-Disposition 'attachment; filename="playlist-flac.m3u"';
    }
}
