upstream radio_backend {
    server YOUR_BACKEND_IP:8000 max_fails=2 fail_timeout=10s;
    server YOUR_BACKUP_BACKEND_IP:8000 backup;
}

# ICY-metadata-injecting proxy for the FLAC/Ogg mount (see backend/
# icy_flac_proxy.py) -- most players read live per-track tags fine from
# the Ogg stream's own chained-header restarts, but some hardware
# streamers only ever look at classic ICY metadata and never re-parse a
# live Ogg stream's headers. Only listeners who actually send
# "Icy-MetaData: 1" get routed through it (see the map below); everyone
# else still hits Icecast directly, unaffected.
upstream icy_flac_backend {
    server YOUR_BACKEND_IP:8010 max_fails=2 fail_timeout=10s;
    server YOUR_BACKUP_BACKEND_IP:8010 backup;
}

# Interleaving raw ICY metadata blocks into the byte stream is safe for MP3
# (self-syncing frames) but corrupts Ogg's own strict page/CRC framing --
# some players (confirmed: VLC 3.0.23) lose flac decoder sync on ICY-in-Ogg.
# Routed here anyway for anyone sending "Icy-MetaData: 1" regardless.
map $http_icy_metadata $flac_stream_backend {
    default        radio_backend;
    "1"            icy_flac_backend;
}

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-domain.com www.your-domain.com;

    ssl_certificate /etc/letsencrypt/live/your-domain.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com-0001/privkey.pem;

    ssl_ecdh_curve X25519MLKEM768:X25519:secp384r1;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/your-domain.com;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
        etag off;
        if_modified_since off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma no-cache always;
    }

    location /radio/stream {
        proxy_bind YOUR_RELAY_IP;
        proxy_pass http://radio_backend/stream;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 5s;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma no-cache always;
    }

    location /radio/stream.flac {
        proxy_bind YOUR_RELAY_IP;
        proxy_pass http://$flac_stream_backend/stream.flac;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 5s;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma no-cache always;
    }

    location /radio/nowplaying.json {
        proxy_pass http://YOUR_BACKEND_IP:8000/nowplaying.json;
        proxy_bind YOUR_RELAY_IP;
        proxy_set_header Host $host;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma no-cache always;
    }
    location /radio/listeners.json {
        proxy_pass http://YOUR_BACKEND_IP:8000/listeners.json;
        proxy_bind YOUR_RELAY_IP;
        proxy_set_header Host $host;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma no-cache always;
    }
    location /radio/cover.jpg {
        proxy_pass http://YOUR_BACKEND_IP:8000/cover.jpg;
        proxy_bind YOUR_RELAY_IP;
        proxy_set_header Host $host;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma no-cache always;
    }
    location /api/subscribers.json {
        proxy_pass http://YOUR_BACKEND_IP:8000/subscribers.json;
        proxy_bind YOUR_RELAY_IP;
        proxy_set_header Host $host;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma no-cache always;
    }

    location /radio/queue.json {
        proxy_pass http://YOUR_BACKEND_IP:8000/queue.json;
        proxy_bind YOUR_RELAY_IP;
        proxy_set_header Host $host;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma no-cache always;
    }

    # HLS mirror of the live stream (short rolling segment window), used by
    # the web player to support seeking backward / jumping to the live edge
    # -- the plain /radio/stream mount above has no Content-Length/byte-range
    # support, so browsers can't seek it at all.
    location /radio/hls/ {
        proxy_pass http://YOUR_BACKEND_IP:8000/hls/;
        proxy_bind YOUR_RELAY_IP;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma no-cache always;
    }

    # Same, for the FLAC quality tier's HLS mirror.
    location /radio/hls-flac/ {
        proxy_pass http://YOUR_BACKEND_IP:8000/hls-flac/;
        proxy_bind YOUR_RELAY_IP;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma no-cache always;
    }

    # Manual queue-editing admin panel -- password gated at this layer, the
    # backend app itself has no auth of its own and only listens on
    # Finland's loopback interface.
    location /admin/ {
        auth_basic "Radio Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-admin;
        proxy_pass http://YOUR_BACKEND_IP:5055/;
        proxy_bind YOUR_RELAY_IP;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Prefix /admin;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 300M;
        client_body_timeout 600s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location = /playlist.m3u {
        default_type audio/x-mpegurl;
        add_header Content-Disposition 'attachment; filename="playlist.m3u"';
    }
    location = /playlist-flac.m3u {
        default_type audio/x-mpegurl;
        add_header Content-Disposition 'attachment; filename="playlist-flac.m3u"';
    }
}
